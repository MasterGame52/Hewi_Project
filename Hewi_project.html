<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hewi | проекты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        /* Кастомный курсор */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #ff4444;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease-out;
            mix-blend-mode: difference;
            box-shadow: 0 0 20px #ff4444, 0 0 40px rgba(255, 68, 68, 0.5);
        }

        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #ff6666;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ff6666;
        }

        .cursor.hover {
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(255, 68, 68, 0.2);
            border-color: #ff6666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Интерактивный фон с частицами */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(200, 0, 0, 0.15) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(150, 0, 0, 0.15) 0%, transparent 35%),
                        radial-gradient(circle at 30% 80%, rgba(255, 50, 0, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 70% 20%, rgba(180, 0, 0, 0.1) 0%, transparent 45%);
            background-size: 250% 250%;
            animation: particlesFlow 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes particlesFlow {
            0% { background-position: 0% 0%; opacity: 0.3; }
            50% { background-position: 100% 100%; opacity: 0.6; }
            100% { background-position: 0% 100%; opacity: 0.3; }
        }

        /* Сетка на фоне */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Заголовок с эффектом глитча */
        .main-title {
            font-size: 4.2rem;
            font-weight: 800;
            margin-bottom: 5px;
            color: #fff0f0;
            animation: titleBreathing 2.2s infinite alternate ease-in-out, fadeInDown 0.8s ease-out;
            letter-spacing: 3px;
            line-height: 1.1;
            position: relative;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .main-title::before,
        .main-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .main-title::before {
            animation: glitch-1 2s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            color: #ff0000;
            opacity: 0.3;
        }

        .main-title::after {
            animation: glitch-2 3s infinite linear alternate-reverse;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            color: #00ffff;
            opacity: 0.3;
        }

        @keyframes glitch-1 {
            0% { transform: translateX(0); }
            20% { transform: translateX(-2px); }
            40% { transform: translateX(2px); }
            60% { transform: translateX(-1px); }
            80% { transform: translateX(1px); }
            100% { transform: translateX(0); }
        }

        @keyframes glitch-2 {
            0% { transform: translateX(0); }
            20% { transform: translateX(2px); }
            40% { transform: translateX(-2px); }
            60% { transform: translateX(1px); }
            80% { transform: translateX(-1px); }
            100% { transform: translateX(0); }
        }

        @keyframes titleBreathing {
            0% { text-shadow: 0 0 20px rgba(255, 0, 0, 0.5); transform: scale(1); }
            100% { text-shadow: 0 0 60px #ff4444, 0 0 30px #aa0000; transform: scale(1.03); }
        }

        /* Подзаголовок с эффектом печатания */
        .subheadline {
            font-size: 1.2rem;
            margin-bottom: 35px;
            color: #ffb3b3;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
            opacity: 0.9;
            animation: fadeInUp 1.2s;
            border-bottom: 1px solid rgba(200, 0, 0, 0.4);
            padding-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .subheadline::after {
            content: '|';
            position: absolute;
            right: 0;
            animation: blink 1s infinite;
            color: #ff4444;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Контейнеры секций */
        .topic-section {
            width: 100%;
            margin-bottom: 35px;
            animation: slideUp 0.7s backwards;
        }

        .topic-section:nth-of-type(1) { animation-delay: 0.1s; }
        .topic-section:nth-of-type(2) { animation-delay: 0.3s; }

        /* Заголовок темы с иконкой */
        .topic-title {
            font-size: 1.3rem;
            font-weight: 400;
            margin-left: 18px;
            margin-bottom: 10px;
            color: #ffb3b3;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topic-title::before {
            content: '';
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, #ff4444, transparent);
            animation: pulseLine 2s infinite;
        }

        @keyframes pulseLine {
            0%, 100% { opacity: 0.5; width: 30px; }
            50% { opacity: 1; width: 50px; }
        }

        /* Идеальные стеклянные кнопки */
        .link-item {
            display: flex;
            width: 100%;
            padding: 18px 25px;
            background: rgba(40, 0, 0, 0.65);
            backdrop-filter: blur(14px) saturate(200%);
            -webkit-backdrop-filter: blur(14px) saturate(200%);
            border: 2px solid rgba(200, 0, 0, 0.6);
            border-radius: 70px;
            color: white;
            text-decoration: none;
            font-size: 1.35rem;
            font-weight: 500;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.8), 0 0 18px rgba(255, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            animation: buttonRise 0.6s backwards;
        }

        .link-item:last-child {
            margin-bottom: 0;
        }

        /* Индивидуальные задержки для кнопок */
        .topic-section:nth-of-type(1) .link-item { animation-delay: 0.15s; }
        .topic-section:nth-of-type(2) .link-item:nth-child(2) { animation-delay: 0.35s; }
        .topic-section:nth-of-type(2) .link-item:nth-child(3) { animation-delay: 0.55s; }

        @keyframes buttonRise {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .link-item:hover {
            background: rgba(140, 0, 0, 0.8);
            border-color: #ff5e5e;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 25px 45px rgba(255, 0, 0, 0.7), 0 0 35px #ff0000;
        }

        /* Анимированный градиент подложки */
        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(120deg, #ff1a1a, #660000, #ff4d4d, #ff1a1a);
            background-size: 300% 300%;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            border-radius: 70px;
        }

        .link-item:hover::before {
            opacity: 0.5;
            animation: gradientFlow 1.8s infinite alternate;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Световая волна */
        .link-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 150%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.7s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        .link-item:hover::after {
            left: 100%;
        }

        .icon {
            font-size: 2rem;
            margin-right: 18px;
            width: 40px;
            text-align: center;
            filter: drop-shadow(0 3px 8px rgba(255, 0, 0, 0.8));
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .link-item:hover .icon {
            transform: rotate(12deg) scale(1.15);
            animation: none;
        }

        .link-text {
            flex: 1;
        }

        .meta-info {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
            color: #ffc2c2;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* Анимация появления секций */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Футер с тонкой анимацией */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 1rem;
            color: #b77;
            border-top: 1px solid rgba(180, 0, 0, 0.3);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            animation: footerGlow 2s infinite alternate, footerFade 1.5s;
            position: relative;
            z-index: 1;
        }

        @keyframes footerGlow {
            0% { text-shadow: 0 0 5px #b00; }
            100% { text-shadow: 0 0 15px #f33; }
        }

        @keyframes footerFade {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Кнопка "Наверх" */
        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(200, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 68, 68, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.5);
        }

        .scroll-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .scroll-to-top:hover {
            background: rgba(255, 0, 0, 0.8);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.8);
        }

        /* Счетчик посещений */
        .visit-counter {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 10px 20px;
            background: rgba(40, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200, 0, 0, 0.4);
            border-radius: 25px;
            font-size: 0.85rem;
            color: #ffb3b3;
            z-index: 1000;
            animation: counterFade 1s;
        }

        @keyframes counterFade {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Адаптация */
        @media (max-width: 480px) {
            * {
                cursor: auto;
            }
            .cursor, .cursor-dot {
                display: none;
            }
            .main-title {
                font-size: 3.2rem;
            }
            .subheadline {
                font-size: 1rem;
                letter-spacing: 3px;
                margin-bottom: 25px;
            }
            .link-item {
                padding: 16px 22px;
                font-size: 1.2rem;
            }
            .icon {
                font-size: 1.7rem;
                margin-right: 14px;
            }
            .topic-title {
                font-size: 1.1rem;
            }
            .scroll-to-top {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }
            .visit-counter {
                bottom: 20px;
                left: 20px;
                padding: 8px 15px;
                font-size: 0.75rem;
            }
        }

        /* Эффект загрузки */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 68, 68, 0.3);
            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: #ff4444;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- Экран загрузки -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text">Загрузка...</div>
        </div>
    </div>

    <!-- Кастомный курсор -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- Канвас для частиц -->
    <canvas id="particleCanvas"></canvas>

    <div class="content">
        <h1 class="main-title" data-text="Hewi">Hewi</h1>
        <div class="subheadline" id="typingText"></div>

        <!-- Секция SnowFune -->
        <div class="topic-section">
            <div class="topic-title">❄️ SNOWFUNE</div>
            <a href="https://t.me/SnowFune" target="_blank" rel="noopener noreferrer" class="link-item">
                <span class="icon">❄️</span>
                <span class="link-text">
                    SnowFune
                    <div class="meta-info">канал</div>
                </span>
            </a>
        </div>

        <!-- Секция HEWI (Ihewi + Логово Hewi) -->
        <div class="topic-section">
            <div class="topic-title">🔥 HEWI</div>
            <!-- Ihewi - контакт для связи -->
            <a href="https://t.me/ihewi" target="_blank" rel="noopener noreferrer" class="link-item">
                <span class="icon">🌊</span>
                <span class="link-text">
                    Ihewi
                    <div class="meta-info">контакт для связи</div>
                </span>
            </a>
            <!-- Логово Hewi - канал -->
            <a href="https://t.me/+oXdOpt4CXOs2MmUy" target="_blank" rel="noopener noreferrer" class="link-item">
                <span class="icon">🔥</span>
                <span class="link-text">
                    Логово Hewi
                    <div class="meta-info">канал</div>
                </span>
            </a>
        </div>
    </div>

    <footer class="footer">
        © 2026 HEWI
    </footer>

    <!-- Кнопка "Наверх" -->
    <a href="#" class="scroll-to-top" id="scrollTop">↑</a>

    <!-- Счетчик посещений -->
    <div class="visit-counter">
        Посещений: <span id="visitCount">0</span>
    </div>

    <script>
        // Скрытие загрузчика
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 800);
        });

        // Кастомный курсор
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursorDot');
        const links = document.querySelectorAll('.link-item, .scroll-to-top');

        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        let dotX = 0, dotY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.1;
            cursorY += (mouseY - cursorY) * 0.1;
            dotX += (mouseX - dotX) * 0.3;
            dotY += (mouseY - dotY) * 0.3;

            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            cursorDot.style.left = dotX + 'px';
            cursorDot.style.top = dotY + 'px';

            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        links.forEach(link => {
            link.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            link.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // Эффект печатающегося текста
        const typingText = document.getElementById('typingText');
        const textToType = 'проекты';
        let charIndex = 0;

        function typeText() {
            if (charIndex < textToType.length) {
                typingText.textContent += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeText, 150);
            }
        }
        setTimeout(typeText, 1000);

        // Частицы на канвасе
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 80;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(255, ${Math.floor(Math.random() * 100)}, ${Math.floor(Math.random() * 100)}, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Соединительные линии
            particles.forEach((p1, index) => {
                for (let j = index + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const distance = Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
                    
                    if (distance < 100) {
                        ctx.strokeStyle = `rgba(255, 0, 0, ${0.2 * (1 - distance / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });

            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Кнопка "Наверх"
        const scrollTopBtn = document.getElementById('scrollTop');

        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });

        scrollTopBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Счетчик посещений
        let visits = localStorage.getItem('hewi_visits') || 0;
        visits++;
        localStorage.setItem('hewi_visits', visits);
        document.getElementById('visitCount').textContent = visits;

        // Параллакс эффект для контента
        document.addEventListener('mousemove', (e) => {
            const content = document.querySelector('.content');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            content.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Звуковой эффект при наведении (опционально)
